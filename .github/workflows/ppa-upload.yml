name: Upload to Launchpad PPA

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to package (e.g. v8.1.6)'
        required: true
        type: string
      source_ref:
        description: 'Git ref to build from'
        required: true
        default: master
        type: string
      ppa_revision:
        description: 'PPA-only Debian revision to append (e.g. 0ppa1)'
        required: true
        default: 0ppa1
        type: string
      series:
        description: 'Ubuntu series to upload'
        required: true
        default: resolute
        type: choice
        options:
          - resolute
          - noble
          - jammy
          - all
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v8.0.0)'
        required: true
        type: string
      source_ref:
        description: 'Git ref to build from'
        required: false
        default: ''
        type: string
      ppa_revision:
        description: 'PPA-only Debian revision to append'
        required: false
        default: ''
        type: string
      series:
        description: 'Ubuntu series to upload'
        required: false
        default: all
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true

jobs:
  upload-ppa:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Configure dput
        run: |
          printf '[amiberry-ppa]\nfqdn = ppa.launchpad.net\nmethod = ftp\nincoming = ~midwan-a/ubuntu/amiberry\nlogin = anonymous\nallow_unsigned_uploads = 0\npassive_ftp = 1\n' > ~/.dput.cf

      - name: Resolve PPA upload inputs
        env:
          TAG_INPUT: ${{ inputs.tag_name || github.event.release.tag_name }}
          PPA_REVISION_INPUT: ${{ inputs.ppa_revision }}
        run: |
          if [ -z "$TAG_INPUT" ]; then
            echo "Missing release tag input" >&2
            exit 1
          fi

          if [ -n "$PPA_REVISION_INPUT" ] && ! [[ "$PPA_REVISION_INPUT" =~ ^[0-9A-Za-z.+~]+$ ]]; then
            echo "Invalid PPA revision: $PPA_REVISION_INPUT" >&2
            exit 1
          fi

          {
            echo "PPA_TAG=$TAG_INPUT"
            echo "PPA_VERSION=${TAG_INPUT#v}"
            echo "PPA_REVISION=$PPA_REVISION_INPUT"
            echo "PPA_BACKPORT_REVISION=${PPA_REVISION_INPUT:-0ppa1}"
          } >> "$GITHUB_ENV"

      - name: Build and upload source package for resolute
        if: ${{ (inputs.series || 'all') == 'all' || (inputs.series || 'all') == 'resolute' }}
        env:
          DEBEMAIL: midwan@gmail.com
          DEBFULLNAME: "Dimitris Panokostas"
        run: |
          PACKAGE_VERSION="$PPA_VERSION"
          RELEASE_MESSAGE="Release $PPA_VERSION"
          if [ -n "$PPA_REVISION" ]; then
            PACKAGE_VERSION="${PPA_VERSION}-${PPA_REVISION}"
            RELEASE_MESSAGE="Release $PPA_VERSION (PPA revision $PPA_REVISION)"
          fi

          bash .github/scripts/upload-launchpad-ppa-source.sh \
            resolute "$PACKAGE_VERSION" "$RELEASE_MESSAGE"

      - name: Build and upload source package for noble
        if: ${{ (inputs.series || 'all') == 'all' || (inputs.series || 'all') == 'noble' }}
        env:
          DEBEMAIL: midwan@gmail.com
          DEBFULLNAME: "Dimitris Panokostas"
        run: |
          PACKAGE_VERSION="${PPA_VERSION}-${PPA_BACKPORT_REVISION}~noble1"
          RELEASE_MESSAGE="Release $PPA_VERSION (Ubuntu 24.04 Noble PPA revision $PPA_BACKPORT_REVISION)"

          bash .github/scripts/upload-launchpad-ppa-source.sh \
            noble "$PACKAGE_VERSION" "$RELEASE_MESSAGE"

      - name: Build and upload source package for jammy
        if: ${{ (inputs.series || 'all') == 'all' || (inputs.series || 'all') == 'jammy' }}
        env:
          DEBEMAIL: midwan@gmail.com
          DEBFULLNAME: "Dimitris Panokostas"
        run: |
          PACKAGE_VERSION="${PPA_VERSION}-${PPA_BACKPORT_REVISION}~jammy1"
          RELEASE_MESSAGE="Release $PPA_VERSION (Ubuntu 22.04 Jammy PPA revision $PPA_BACKPORT_REVISION)"

          bash .github/scripts/upload-launchpad-ppa-source.sh \
            jammy "$PACKAGE_VERSION" "$RELEASE_MESSAGE"
