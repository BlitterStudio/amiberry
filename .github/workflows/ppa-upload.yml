name: Upload to Launchpad PPA

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v8.0.0)'
        required: true
        type: string
    secrets:
      GPG_PRIVATE_KEY:
        required: true

jobs:
  upload-ppa:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            debhelper \
            dput \
            ninja-build \
            libflac-dev \
            libmpeg2-4-dev \
            libpng-dev \
            libsdl3-dev \
            libsdl3-image-dev \
            libasound2-dev \
            libmpg123-dev \
            libportmidi-dev \
            libserialport-dev \
            libenet-dev \
            libpcap-dev \
            libzstd-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Configure dput
        run: |
          printf '[amiberry-ppa]\nfqdn = ppa.launchpad.net\nmethod = ftp\nincoming = ~midwan-a/ubuntu/amiberry\nlogin = anonymous\nallow_unsigned_uploads = 0\n' > ~/.dput.cf

      - name: Build and upload source package for noble
        env:
          DEBEMAIL: midwan@gmail.com
          DEBFULLNAME: "Dimitris Panokostas"
        run: |
          # Derive clean version from tag: v8.0.0 -> 8.0.0
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          mkdir -p /tmp/ppa-build/noble
          cp -r . /tmp/ppa-build/noble/amiberry
          cd /tmp/ppa-build/noble/amiberry

          # Remove placeholder changelog so dch --create can write a fresh one
          rm -f debian/changelog

          # Write a fresh changelog entry for this release
          dch --create --package amiberry \
            --newversion "${VERSION}-1" \
            --distribution noble \
            "Release ${VERSION}"

          # Build source package only (no binaries — Launchpad builds them)
          dpkg-buildpackage -S -d -us -uc

          # Sign the .changes file
          debsign -k D74D52525340C442A4F8B657A12B57C04E1FE282 \
            /tmp/ppa-build/noble/amiberry_*_source.changes

          # Upload to PPA
          dput amiberry-ppa /tmp/ppa-build/noble/amiberry_*_source.changes

      - name: Build and upload source package for jammy
        env:
          DEBEMAIL: midwan@gmail.com
          DEBFULLNAME: "Dimitris Panokostas"
        run: |
          # Derive clean version from tag: v8.0.0 -> 8.0.0
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          mkdir -p /tmp/ppa-build/jammy
          cp -r . /tmp/ppa-build/jammy/amiberry
          cd /tmp/ppa-build/jammy/amiberry

          rm -f debian/changelog

          # jammy gets a ~jammy1 suffix so both series coexist in the PPA
          dch --create --package amiberry \
            --newversion "${VERSION}-1~jammy1" \
            --distribution jammy \
            "Release ${VERSION} (Ubuntu 22.04 Jammy rebuild)"

          # Build source package
          dpkg-buildpackage -S -d -us -uc

          # Sign the .changes file
          debsign -k D74D52525340C442A4F8B657A12B57C04E1FE282 \
            /tmp/ppa-build/jammy/amiberry_*_source.changes

          # Upload to PPA
          dput amiberry-ppa /tmp/ppa-build/jammy/amiberry_*_source.changes
